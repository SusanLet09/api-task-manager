trigger:
  - main

pool:
  vmImage: 'ubuntu-latest'

steps:
  - task: Maven@4
    displayName: 'Build Task Manager API'

    inputs:
      mavenPomFile: 'pom.xml'
      goals: 'clean install'
      publishJUnitResults: false
      javaHomeOption: 'JDKVersion'
      jdkVersionOption: '17'
      mavenVersionOption: 'Default'